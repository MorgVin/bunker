<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бункер — Общий экран</title>
    <style>
        body {
            background: #0a0a0a url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #0f0;
            text-shadow: 0 0 15px #0f0;
            margin-bottom: 30px;
            font-size: 3em;
        }
        .catastrophe-container {
            text-align: center;
            margin: 30px auto 60px;
            max-width: 1000px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            border: 1px solid #444;
        }
        .catastrophe-container h2 {
            margin: 0 0 15px;
            color: #ff4444;
            text-shadow: 0 0 10px #ff4444;
        }
        .catastrophe-container img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(255,68,68,0.4);
            border: 2px solid #444;
        }
        .card-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            width: 420px;
            background: linear-gradient(to bottom, rgba(30,30,30,0.95), rgba(10,10,10,0.95));
            border: 1px solid #444;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(30px);
            box-shadow: 0 10px 30px rgba(0,255,0,0.2);
        }
        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(0,255,0,0.4);
        }
        .username {
            text-align: center;
            padding: 16px 12px;
            font-size: 1.6em;
            color: #0f0;
            background: rgba(0,0,0,0.6);
            margin: 0;
        }
        .avatar {
            width: 100%;
            height: auto;
            display: block;
        }
        .categories {
            padding: 20px;
        }
        .category {
            margin: 12px 0;
            font-size: 1.1em;
        }
        .label {
            color: #0f8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Бункер — Общий экран</h1>

    <!-- Глобальная катастрофа -->
    <div id="catastrophe-container" class="catastrophe-container">
        <h2>Ожидание катастрофы...</h2>
        <p>Раздача карт ещё не началась</p>
    </div>

    <!-- Карточки игроков -->
    <div id="card-grid" class="card-grid"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();

        socket.on('connect', () => console.log("Socket.IO подключён"));
        socket.on('disconnect', () => console.log("Socket.IO отключён"));

        // Создание/обновление карточки — ТОЛЬКО НИК без ID
        socket.on('create_card', function(data) {
            console.log("create_card:", data);
            let card = document.getElementById(`card-${data.player_id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${data.player_id}`;
                card.className = 'card';
                card.innerHTML = `
                    <div class="username">${data.username || '???'}</div>
                    <img src="${data.avatar || '/static/avatars/default.jpg'}" class="avatar" alt="Аватар" onerror="this.src='/static/avatars/default.jpg'">
                    <div class="categories">
                        <div class="category" data-category="gender_age"><span class="label">Пол / Возраст:</span> ${data.categories?.gender_age?.value || '????'}</div>
                        <div class="category" data-category="profession"><span class="label">Профессия:</span> ${data.categories?.profession?.value || '????'}</div>
                        <div class="category" data-category="health"><span class="label">Здоровье:</span> ${data.categories?.health?.value || '????'}</div>
                        <div class="category" data-category="baggage"><span class="label">Багаж:</span> ${data.categories?.baggage?.value || '????'}</div>
                        <div class="category" data-category="hobby"><span class="label">Хобби / Навык:</span> ${data.categories?.hobby?.value || '????'}</div>
                        <div class="category" data-category="secret"><span class="label">Секрет:</span> ${data.categories?.secret?.value || '????'}</div>
                        <div class="category" data-category="chance"><span class="label">Шанс выживания:</span> ${data.categories?.chance?.value || '????'}</div>
                    </div>
                `;
                document.getElementById('card-grid').appendChild(card);
                setTimeout(() => card.classList.add('visible'), 100);
            } else {
                card.querySelector('.username').textContent = data.username || '???';
            }
        });

        // Обновление ника — без ID
        socket.on('update_nick', function(data) {
            console.log("update_nick:", data);
            const card = document.getElementById(`card-${data.player_id}`);
            if (card) {
                card.querySelector('.username').textContent = data.username || '???';
            }
        });

        // Обновление категории
        socket.on('update_category', function(data) {
            console.log("update_category:", data);
            const card = document.getElementById(`card-${data.player_id}`);
            if (card) {
                const catDiv = card.querySelector(`[data-category="${data.category}"]`);
                if (catDiv) {
                    catDiv.innerHTML = `<span class="label">${data.label}:</span> ${data.value}`;
                }
            }
        });

        // Глобальная катастрофа — надёжная версия
        socket.on('set_catastrophe', function(data) {
            console.log("Получена катастрофа:", data);
            const container = document.getElementById('catastrophe-container');
            if (container) {
                const title = data.catastrophe || 'Катастрофа неизвестна';
                const imgSrc = data.catastrophe_image || '/static/catastrophes/default.jpg';
                container.innerHTML = `
                    <h2>${title}</h2>
                    <img src="${imgSrc}" alt="${title}" 
                         onerror="this.src='/static/catastrophes/default.jpg'; this.alt='Изображение не найдено';">
                `;
            } else {
                console.error("Контейнер катастрофы не найден");
            }
        });

        // Кик — карточка исчезает
        socket.on('kick_player', function(data) {
            console.log("Кик игрока:", data);
            const card = document.getElementById(`card-${data.player_id}`);
            if (card) card.remove();
        });

        // Очистка
        socket.on('clear_all', function() {
            console.log("clear_all");
            document.getElementById('card-grid').innerHTML = '';
            document.getElementById('catastrophe-container').innerHTML = '<h2>Ожидание новой катастрофы...</h2><p>Раздача карт ещё не началась</p>';
        });
    </script>
</body>
</html>
